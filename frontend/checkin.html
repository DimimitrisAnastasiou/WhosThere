<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check In — CheckIn</title>
  <link rel="stylesheet" href="/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">📍 CheckIn</a>
    <div class="nav-links">
      <a href="/">Feed</a>
      <a href="/places.html">Places</a>
      <span id="nav-auth"></span>
    </div>
  </nav>

  <main class="container narrow">
    <h1>Check In</h1>

    <div class="card">
      <label class="label" for="place-search">Search for a place</label>
      <input
        id="place-search"
        type="text"
        class="input"
        placeholder="Café, gym, park…"
        autocomplete="off"
      />
      <ul id="place-suggestions" class="suggestions hidden"></ul>

      <div id="selected-place" class="selected-place hidden">
        <span id="selected-place-name"></span>
        <button id="clear-place" class="btn-clear">✕</button>
      </div>

      <label class="label" for="checkin-note">Note (optional)</label>
      <textarea id="checkin-note" class="input" rows="3" placeholder="What are you up to?"></textarea>

      <label class="checkbox-label">
        <input type="checkbox" id="checkin-anonymous" />
        Check in anonymously
      </label>

      <button id="btn-submit" class="btn btn-primary" disabled>Check In</button>
      <p id="checkin-error" class="error hidden"></p>
    </div>

    <div class="card-section">
      <p class="muted">Can't find your place? <a href="#" id="create-custom">Create a custom place</a></p>
    </div>

    <!-- Custom place form (hidden by default) -->
    <div id="custom-place-form" class="card hidden">
      <h3>Create a custom place</h3>
      <label class="label">Name</label>
      <input id="custom-name" type="text" class="input" placeholder="Place name" />
      <label class="label">Address (optional)</label>
      <input id="custom-address" type="text" class="input" placeholder="Address" />
      <button id="btn-add-custom" class="btn btn-secondary">Add Place</button>
    </div>
  </main>

  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="/js/checkin.js"></script>
</body>
</html>
