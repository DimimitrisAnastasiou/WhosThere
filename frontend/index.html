<!DOCTYPE html>
<html lang="en">
<head>

  <title>CheckIn</title>
  <link rel="stylesheet" href="/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <a href="/" class="nav-logo">📍 CheckIn</a>
    <div class="nav-links">
      <a href="/places.html">Places</a>
      <span id="nav-auth"></span>
