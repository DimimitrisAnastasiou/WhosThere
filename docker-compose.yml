services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      - db

  frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5500:5500"
    command: python -m http.server 5500

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: checkin
      POSTGRES_PASSWORD: checkin
      POSTGRES_DB: checkin
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
